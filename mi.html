<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LUCKY 777 - LIVE RESULTS</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Oswald:wght@700&family=Roboto:wght@400;900&display=swap');

        body { background-color: #4a0000; color: white; font-family: 'Roboto', sans-serif; margin: 0; padding: 0; display: flex; justify-content: center; }
        .app-container { width: 100%; max-width: 450px; background: #7a0000; min-height: 100vh; box-shadow: 0 0 20px rgba(0,0,0,0.5); }

        .header { background: #000; padding: 15px; border-bottom: 3px solid #ffd700; text-align: center; }
        .logo-text { font-family: 'Oswald', sans-serif; font-size: 32px; color: #ffd700; margin: 0; letter-spacing: 2px; text-shadow: 2px 2px #5c0000; }
        .sub-text { font-size: 10px; color: #fff; text-transform: uppercase; margin-top: 2px; opacity: 0.8; letter-spacing: 1px; }

        .notice-bar { background: #ffd700; color: #000; font-size: 11px; font-weight: 900; padding: 5px 0; border-bottom: 1px solid #000; }

        .timer-box { background: #111; color: #ffd700; padding: 10px; margin: 10px; border-radius: 8px; font-weight: bold; font-size: 14px; border: 1px solid #ffd700; display: flex; justify-content: space-around; align-items: center; }
        #countdown { color: #fff; font-size: 20px; font-family: 'Oswald', sans-serif; }

        .search-section { padding: 10px; display: flex; gap: 8px; justify-content: center; align-items: center; }
        input[type="date"] { padding: 8px; border-radius: 5px; border: none; font-size: 12px; width: 140px; font-weight: bold; }
        .search-btn { background: #ffd700; color: #000; border: none; padding: 8px 15px; font-weight: 900; cursor: pointer; border-radius: 5px; font-size: 12px; text-transform: uppercase; }

        .table-wrapper { padding: 10px; }
        .result-table { width: 100%; border-collapse: collapse; background: #fff; color: #000; border-radius: 8px; overflow: hidden; font-size: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        .result-table th { background: #000; color: #ffd700; padding: 12px 5px; font-size: 13px; letter-spacing: 1px; border: 1px solid #222; }
        .result-table td { border: 1px solid #eee; padding: 12px 5px; font-weight: 900; text-align: center; font-size: 18px; }
        .time-col { background: #8b0000; color: #fff !important; width: 90px; font-size: 13px !important; font-family: 'Oswald', sans-serif; }

        footer { padding: 25px; text-align: center; font-size: 11px; opacity: 0.7; color: #fff; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="header">
        <h1 class="logo-text">LUCKY 777</h1>
        <p class="sub-text">FASTEST LIVE RESULTS PORTAL</p>
    </div>

    <marquee class="notice-bar">Welcome to Lucky 777 - Sabse Tez Results Yahan Milega! Fresh Results ke liye page refresh karein.</marquee>

    <div class="timer-box">
        <span><i class="fas fa-clock"></i> NEXT: <span id="nextTime">--:--</span></span>
        <span id="countdown">00:00</span>
    </div>

    <div class="search-section">
        <input type="date" id="searchDate">
        <button class="search-btn" onclick="searchResult()"><i class="fas fa-search"></i> Search</button>
    </div>

    <div class="table-wrapper">
        <table class="result-table">
            <thead>
                <tr>
                    <th class="time-col">TIME</th>
                    <th>A</th>
                    <th>B</th>
                    <th>C</th>
                    <th>D</th>
                </tr>
            </thead>
            <tbody id="resultBody">
                </tbody>
        </table>
    </div>

    <footer>
        <p>&copy; 2026 LUCKY 777 | Developed by Guru Prasad</p>
    </footer>
</div>

<script>
    // 🔥 Updated Naya Firebase Config
    const firebaseConfig = {
        apiKey: "AIzaSyC7npaib3bcOy5rHCAduQnizEQ2BIe53no",
        authDomain: "lucky-777-official.firebaseapp.com",
        databaseURL: "https://lucky-777-official-default-rtdb.firebaseio.com",
        projectId: "lucky-777-official",
        storageBucket: "lucky-777-official.firebasestorage.app",
        messagingSenderId: "882454930084",
        appId: "1:882454930084:web:faa48f9c075def95d07c31"
    };
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    // 🚀 Load Results Function
    function loadResults(dateStr = null) {
        const resultBody = document.getElementById('resultBody');
        const targetDate = dateStr || new Date().toISOString().split('T')[0];

        database.ref('results/' + targetDate).on('value', (snapshot) => {
            const data = snapshot.val();
            if(!data) {
                resultBody.innerHTML = "<tr><td colspan='5' style='padding:40px; color:#666;'>Pratiksha Karein... No Results Found</td></tr>";
                return;
            }
            resultBody.innerHTML = "";
            const times = Object.keys(data).sort().reverse();
            times.forEach(time => {
                let row = `<tr><td class="time-col">${time}</td>`;
                if(data[time].numbers) {
                    data[time].numbers.forEach(num => { row += `<td>${num}</td>`; });
                }
                row += `</tr>`;
                resultBody.innerHTML += row;
            });
        });
    }

    // 🔥 Sync Next Result Time (Admin se seedha)
    function syncTimer() {
        database.ref('app_settings/lucky777/nextResultTime').on('value', (snap) => {
            if(snap.val()) {
                document.getElementById('nextTime').innerText = snap.val();
            } else {
                document.getElementById('nextTime').innerText = "WAIT";
            }
        });
    }

    function searchResult() {
        const dateInput = document.getElementById('searchDate').value;
        if(!dateInput) return alert("Select Date!");
        loadResults(dateInput);
    }

    // Static Countdown Timer (Auto loop every 30 mins)
    function startTimer() {
        let seconds = 1800;
        setInterval(() => {
            if(seconds <= 0) seconds = 1800;
            seconds--;
            let m = Math.floor(seconds / 60);
            let s = seconds % 60;
            document.getElementById('countdown').innerText = (m<10?'0'+m:m) + ":" + (s<10?'0'+s:s);
        }, 1000);
    }

    window.onload = () => {
        loadResults();
        startTimer();
        syncTimer();
    };
</script>
</body>
</html>
