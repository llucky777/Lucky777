<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LUCKY 777</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Oswald:wght@700&family=Roboto:wght@400;900&display=swap');
        body { background-color: #4a0000; color: white; font-family: 'Roboto', sans-serif; margin: 0; padding: 0; display: flex; justify-content: center; }
        .app-container { width: 100%; max-width: 450px; background: #7a0000; min-height: 100vh; }
        .header { background: #000; padding: 15px; border-bottom: 3px solid #ffd700; text-align: center; }
        .logo-text { font-family: 'Oswald', sans-serif; font-size: 35px; color: #ffd700; margin: 0; letter-spacing: 2px; }
        .sub-text { font-size: 11px; color: #fff; text-transform: uppercase; margin-top: 2px; font-weight: bold; }
        
        /* 🔥 Notice Bar Hata Diya */

        .timer-box { background: #111; color: #ffd700; padding: 15px; margin: 15px 10px; border-radius: 8px; font-weight: bold; border: 1px solid #ffd700; text-align: center; }
        #nextTimeDisplay { font-size: 24px; color: #fff; font-family: 'Oswald', sans-serif; }

        .search-section { padding: 10px; display: flex; gap: 8px; justify-content: center; }
        input[type="date"] { padding: 8px; border-radius: 5px; border: none; font-size: 14px; width: 150px; font-weight: bold; }
        .search-btn { background: #ffd700; color: #000; border: none; padding: 8px 20px; font-weight: 900; cursor: pointer; border-radius: 5px; text-transform: uppercase; }

        .table-wrapper { padding: 10px; }
        .result-table { width: 100%; border-collapse: collapse; background: #fff; color: #000; border-radius: 8px; overflow: hidden; }
        .result-table th { background: #000; color: #ffd700; padding: 15px 5px; font-size: 15px; border: 1px solid #222; }
        .result-table td { border: 1px solid #eee; padding: 15px 5px; font-weight: 900; text-align: center; font-size: 20px; }
        .time-col { background: #8b0000; color: #fff !important; width: 100px; font-family: 'Oswald', sans-serif; }

        footer { padding: 30px; text-align: center; font-size: 12px; font-weight: bold; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="header">
        <h1 class="logo-text">LUCKY 777</h1>
        <p class="sub-text">FASTEST LIVE RESULTS PORTAL</p>
    </div>

    <div class="timer-box">
        <span style="font-size: 14px; display: block; margin-bottom: 5px;"><i class="fas fa-clock"></i> NEXT RESULT AT</span>
        <span id="nextTimeDisplay">--:-- --</span>
    </div>

    <div class="search-section">
        <input type="date" id="searchDate">
        <button class="search-btn" onclick="searchResult()"><i class="fas fa-search"></i> SEARCH</button>
    </div>

    <div class="table-wrapper">
        <table class="result-table">
            <thead>
                <tr>
                    <th class="time-col">TIME</th>
                    <th>A</th>
                    <th>B</th>
                    <th>C</th>
                    <th>D</th>
                </tr>
            </thead>
            <tbody id="resultBody"></tbody>
        </table>
    </div>

    <footer>
        <p>&copy; 2026 LUCKY 777</p>
    </footer>
</div>

<script>
    // 🔥 CONFIG: Apni sahi config yahan dalo
    const firebaseConfig = {
        apiKey: "AIzaSyC7npaib3bcOy5rHCAduQnizEQ2BIe53no",
        authDomain: "lucky-777-official.firebaseapp.com",
        databaseURL: "https://lucky-777-official-default-rtdb.firebaseio.com",
        projectId: "lucky-777-official",
        appId: "1:882454930084:web:faa48f9c075def95d07c31"
    };
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    function loadResults(dateStr = null) {
        const resultBody = document.getElementById('resultBody');
        const targetDate = dateStr || new Date().toISOString().split('T')[0];

        database.ref('results/' + targetDate).on('value', (snapshot) => {
            const data = snapshot.val();
            if(!data) {
                resultBody.innerHTML = "<tr><td colspan='5' style='padding:40px; color:#666;'>No Results Found</td></tr>";
                return;
            }
            resultBody.innerHTML = "";
            const times = Object.keys(data).sort().reverse();
            times.forEach(time => {
                let row = `<tr><td class="time-col">${time}</td>`;
                if(data[time].numbers) {
                    data[time].numbers.forEach(num => { row += `<td>${num}</td>`; });
                }
                row += `</tr>`;
                resultBody.innerHTML += row;
            });
        });
    }

    // 🔥 SYNC NEXT TIME: Ye tumhare Admin Control se chalega
    function syncAdminTime() {
        database.ref('app_settings/lucky777/nextResultTime').on('value', (snap) => {
            if(snap.val()) {
                document.getElementById('nextTimeDisplay').innerText = snap.val();
            }
        });
    }

    function searchResult() {
        const dateInput = document.getElementById('searchDate').value;
        if(!dateInput) return alert("Select Date!");
        loadResults(dateInput);
    }

    window.onload = () => {
        loadResults();
        syncAdminTime();
    };
</script>
</body>
</html>
