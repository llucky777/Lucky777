<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LUCKY 777 - Results</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <style>
        /* General Styling - Simple & Clean */
        body { 
            background-color: #f4f4f4; 
            color: #333; 
            font-family: Arial, sans-serif; 
            margin: 0; 
            padding: 0; 
            display: flex; 
            justify-content: center; 
        }
        .app-container { 
            width: 100%; 
            max-width: 500px; 
            background: #ffffff; 
            min-height: 100vh; 
            box-shadow: 0 0 10px rgba(0,0,0,0.1); 
        }

        /* Standard Header */
        .header { 
            background: #2c3e50; 
            color: white; 
            padding: 20px 10px; 
            text-align: center; 
            border-bottom: 4px solid #e74c3c;
        }
        .logo-text { font-size: 28px; margin: 0; letter-spacing: 1px; }
        .sub-text { font-size: 12px; margin-top: 5px; opacity: 0.9; }

        /* Next Result Info */
        .timer-box { 
            background: #ecf0f1; 
            padding: 15px; 
            margin: 15px; 
            border-radius: 5px; 
            text-align: center; 
            border: 1px solid #bdc3c7;
        }
        .next-label { font-size: 13px; color: #7f8c8d; font-weight: bold; }
        #nextTimeDisplay { font-size: 22px; color: #c0392b; font-weight: bold; display: block; margin-top: 5px; }

        /* Search Section */
        .search-section { 
            padding: 10px; 
            display: flex; 
            gap: 10px; 
            justify-content: center; 
            background: #fff;
        }
        input[type="date"] { 
            padding: 8px; 
            border: 1px solid #ccc; 
            border-radius: 4px; 
            font-size: 14px; 
        }
        .search-btn { 
            background: #2980b9; 
            color: white; 
            border: none; 
            padding: 8px 15px; 
            border-radius: 4px; 
            cursor: pointer; 
            font-weight: bold;
        }

        /* Result Table - Simple Style */
        .table-wrapper { padding: 10px; }
        .result-table { 
            width: 100%; 
            border-collapse: collapse; 
            margin-top: 10px;
            font-size: 16px;
        }
        .result-table th { 
            background: #34495e; 
            color: white; 
            padding: 12px 5px; 
            text-align: center;
            border: 1px solid #2c3e50;
        }
        .result-table td { 
            border: 1px solid #ddd; 
            padding: 12px 5px; 
            text-align: center; 
            font-weight: bold;
            color: #2c3e50;
        }
        .time-col { background: #f9f9f9; width: 100px; color: #e74c3c !important; }

        footer { 
            padding: 20px; 
            text-align: center; 
            font-size: 12px; 
            color: #95a5a6; 
            border-top: 1px solid #eee;
            margin-top: 20px;
        }
    </style>
</head>
<body>

<div class="app-container">
    <div class="header">
        <h1 class="logo-text">LUCKY 777</h1>
        <p class="sub-text">Official Results Portal</p>
    </div>

    <div class="timer-box">
        <span class="next-label">NEXT RESULT SCHEDULED AT</span>
        <span id="nextTimeDisplay">LOADING...</span>
    </div>

    <div class="search-section">
        <input type="date" id="searchDate">
        <button class="search-btn" onclick="searchResult()">View Results</button>
    </div>

    <div class="table-wrapper">
        <table class="result-table">
            <thead>
                <tr>
                    <th>TIME</th>
                    <th>A</th>
                    <th>B</th>
                    <th>C</th>
                    <th>D</th>
                </tr>
            </thead>
            <tbody id="resultBody">
                </tbody>
        </table>
    </div>

    <footer>
        <p>&copy; 2026 LUCKY 777 Portal. All rights reserved.</p>
    </footer>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyC7npaib3bcOy5rHCAduQnizEQ2BIe53no",
        authDomain: "lucky-777-official.firebaseapp.com",
        databaseURL: "https://lucky-777-official-default-rtdb.firebaseio.com",
        projectId: "lucky-777-official",
        appId: "1:882454930084:web:faa48f9c075def95d07c31"
    };
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    function startLiveUpdates(dateStr = null) {
        const resultBody = document.getElementById('resultBody');
        const targetDate = dateStr || new Date().toISOString().split('T')[0];

        database.ref('results/' + targetDate).on('value', (snapshot) => {
            const data = snapshot.val();
            if(!data) {
                resultBody.innerHTML = "<tr><td colspan='5' style='padding:30px; color:#999;'>No results available for this date.</td></tr>";
                return;
            }
            
            resultBody.innerHTML = "";
            const times = Object.keys(data).sort().reverse();
            const now = new Date();
            let hasResults = false;

            times.forEach(resTime => {
                const resDateTime = new Date(`${targetDate} ${resTime}`);
                if (now >= resDateTime) {
                    hasResults = true;
                    let row = `<tr><td class="time-col">${resTime}</td>`;
                    if(data[resTime].numbers) {
                        data[resTime].numbers.forEach(num => { row += `<td>${num}</td>`; });
                    }
                    row += `</tr>`;
                    resultBody.innerHTML += row;
                }
            });

            if (!hasResults) {
                resultBody.innerHTML = "<tr><td colspan='5' style='padding:30px; color:#999;'>New results will appear here shortly.</td></tr>";
            }
        });
    }

    function syncAdminTime() {
        database.ref('app_settings/lucky777/nextResultTime').on('value', (snap) => {
            document.getElementById('nextTimeDisplay').innerText = snap.val() || "TO BE ANNOUNCED";
        });
    }

    function searchResult() {
        const dateInput = document.getElementById('searchDate').value;
        if(!dateInput) return alert("Please select a date first.");
        startLiveUpdates(dateInput);
    }

    window.onload = () => {
        startLiveUpdates();
        syncAdminTime();
        setInterval(() => {
            const searchVal = document.getElementById('searchDate').value;
            if(!searchVal) startLiveUpdates(); 
        }, 30000);
    };
</script>
</body>
</html>
