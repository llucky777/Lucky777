<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>LUCKY 777 - FINAL AUTO FIX</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #4a0000; margin: 0; padding: 0; font-family: Arial, sans-serif; display: flex; justify-content: center; }
        .main-wrapper { width: 100%; max-width: 500px; background-color: #7a0000; min-height: 100vh; box-shadow: 0 0 20px rgba(0,0,0,0.5); padding-bottom: 50px; }
        .header { background: #000; padding: 20px 10px; text-align: center; border-bottom: 4px solid #ffd700; }
        .logo { font-size: 35px; color: #ffd700; font-weight: 900; margin: 0; text-shadow: 2px 2px #000; letter-spacing: 2px; }
        .date-bar { background: #ffd700; color: #000; padding: 10px; text-align: center; font-weight: bold; font-size: 16px; text-transform: uppercase; border-bottom: 2px solid #000; }
        .timer-section { background: #111; margin: 15px; padding: 20px; border: 2px solid #ffd700; border-radius: 8px; text-align: center; }
        .next-label { color: #ffd700; font-size: 13px; font-weight: bold; margin-bottom: 10px; display: block; }
        #countdownDisplay { color: #fff; font-size: 32px; font-weight: 900; font-family: 'Courier New', monospace; display: block; }
        #nextTimeTarget { color: #aaa; font-size: 12px; margin-top: 8px; display: block; }
        .search-area { text-align: center; padding: 15px; background: rgba(0,0,0,0.2); }
        input[type="date"] { padding: 8px; font-size: 14px; border-radius: 4px; border: none; font-weight: bold; }
        .search-btn { background: #ffd700; color: #000; padding: 8px 15px; border: none; border-radius: 4px; font-weight: 900; cursor: pointer; }
        .table-container { padding: 10px; }
        .result-table { width: 100%; border-collapse: collapse; background: #fff; color: #000; text-align: center; border-radius: 5px; overflow: hidden; }
        .result-table th { background: #ffd700; color: #000; padding: 12px 5px; font-size: 14px; border: 1px solid #000; }
        .result-table td { border: 1px solid #ccc; padding: 12px 5px; font-size: 20px; font-weight: 900; }
        .time-col { background: #8b0000; color: #fff !important; width: 100px; }
        footer { text-align: center; color: #fff; padding: 40px 10px; font-size: 12px; opacity: 0.7; }
    </style>
</head>
<body>

<div class="main-wrapper">
    <div class="header">
        <h1 class="logo">LUCKY 777</h1>
    </div>
    <div class="date-bar" id="currentDayDisplay">TODAY: --/--/----</div>
    <div class="timer-section">
        <span class="next-label" id="timerLabel">NEXT RESULT COUNTDOWN</span>
        <span id="countdownDisplay">00:00:00</span>
        <span id="nextTimeTarget">TARGET: --:-- --</span>
    </div>
    <div class="search-area">
        <input type="date" id="searchDate">
        <button class="search-btn" onclick="searchResult()">SEARCH</button>
    </div>
    <div class="table-container">
        <table class="result-table">
            <thead>
                <tr><th class="time-col">TIME</th><th>A</th><th>B</th><th>C</th><th>D</th></tr>
            </thead>
            <tbody id="resultBody"></tbody>
        </table>
    </div>
    <footer><p>&copy; 2026 llucky777.github.io | Official Results Portal</p></footer>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyC7npaib3bcOy5rHCAduQnizEQ2BIe53no",
        authDomain: "lucky-777-official.firebaseapp.com",
        databaseURL: "https://lucky-777-official-default-rtdb.firebaseio.com",
        projectId: "lucky-777-official",
        appId: "1:882454930084:web:faa48f9c075def95d07c31"
    };
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    let timerInterval;
    let currentSystemDate = "";

    function generateLuckyNumbers() {
        let nums = new Set();
        while(nums.size < 4) {
            let n = (Math.random() < 0.2) ? Math.floor(Math.random() * 9) + 1 : Math.floor(Math.random() * 90) + 10;
            nums.add(n.toString().padStart(2, '0'));
        }
        return Array.from(nums);
    }

    // 🔥 1. SMART AUTO-FILL (Covers Today & Yesterday)
    async function checkAndFillMissingResults(dateStr) {
        const now = new Date();
        const curH = now.getHours();
        const curM = now.getMinutes();

        // Yesterday's Date Calculation
        let yesterday = new Date();
        yesterday.setDate(yesterday.getDate() - 1);
        const yesterdayStr = yesterday.toISOString().split('T')[0];

        const datesToFill = [yesterdayStr, dateStr];

        for (let targetDate of datesToFill) {
            for (let h = 9; h <= 21; h++) {
                for (let m = 0; m < 60; m += 15) {
                    if (h === 21 && m > 0) break; // Strict 9:00 PM Cap

                    // If it's today, check if time passed. If yesterday, check all slots.
                    let isTimePassed = (targetDate === yesterdayStr) || (h < curH || (h === curH && m <= curM));
                    
                    if (isTimePassed) {
                        let ampm = h >= 12 ? "PM" : "AM";
                        let hDisp = h % 12 || 12;
                        let timeKey = `${hDisp < 10 ? '0' + hDisp : hDisp}:${m < 10 ? '0' + m : m} ${ampm}`;

                        const ref = database.ref(`results/${targetDate}/${timeKey}`);
                        const snap = await ref.once('value');
                        if (!snap.exists()) {
                            await ref.set({ numbers: generateLuckyNumbers(), timestamp: Date.now() });
                        }
                    }
                }
            }
        }
    }

    async function saveAutoResult(timeStr, dateStr) {
        const ref = database.ref(`results/${dateStr}/${timeStr}`);
        const snap = await ref.once('value');
        if(!snap.exists()) {
            await ref.set({ numbers: generateLuckyNumbers(), timestamp: Date.now() });
            startLiveUpdates(dateStr);
        }
    }

    function updateSystemDate() {
        const now = new Date();
        const year = now.getFullYear();
        const month = String(now.getMonth() + 1).padStart(2, '0');
        const day = String(now.getDate()).padStart(2, '0');
        const todayStr = `${year}-${month}-${day}`;
        if (todayStr !== currentSystemDate) {
            currentSystemDate = todayStr;
            const options = { weekday: 'short', day: '2-digit', month: '2-digit', year: 'numeric' };
            document.getElementById('currentDayDisplay').innerText = "TODAY: " + now.toLocaleDateString('en-GB', options);
            startLiveUpdates(todayStr);
        }
        checkAndFillMissingResults(currentSystemDate);
    }

    function autoScheduler() {
        const now = new Date();
        const hour = now.getHours();
        const min = now.getMinutes();

        if (hour < 9) {
            document.getElementById('countdownDisplay').innerText = "OPENS AT 9AM";
            document.getElementById('nextTimeTarget').innerText = "TARGET: 09:00 AM";
            return;
        }

        if (hour >= 9 && hour < 21) {
            let nextM = Math.ceil((min + 1) / 15) * 15;
            let nextH = hour;
            if (nextM >= 60) { nextM = 0; nextH++; }
            
            if(nextH === 21 && nextM > 0) { showClosed(); return; }
            const period = nextH >= 12 ? "PM" : "AM";
            let hDisp = nextH % 12 || 12;
            const target = `${hDisp < 10 ? '0'+hDisp : hDisp}:${nextM < 10 ? '0'+nextM : nextM} ${period}`;
            startCountdown(target, currentSystemDate);
        } else {
            showClosed();
        }
    }

    function showClosed() {
        const display = document.getElementById('countdownDisplay');
        display.innerText = "CLOSED";
        display.style.color = "#ff3131";
        document.getElementById('nextTimeTarget').innerText = "OPENS AT 09:00 AM";
    }

    function startCountdown(targetTime, targetDate) {
        if(timerInterval) clearInterval(timerInterval);
        document.getElementById('nextTimeTarget').innerText = "TARGET: " + targetTime;
        timerInterval = setInterval(async () => {
            const now = new Date();
            let [time, mod] = targetTime.split(' ');
            let [h, m] = time.split(':').map(Number);
            if (h === 12) h = 0;
            if (mod === 'PM') h += 12;
            const target = new Date(targetDate);
            target.setHours(h, m, 0, 0);
            const diff = target.getTime() - now.getTime();
            const display = document.getElementById('countdownDisplay');
            if (diff <= 0) {
                clearInterval(timerInterval);
                display.innerText = "CHECK NOW!";
                display.style.color = "#39ff14";
                await saveAutoResult(targetTime, targetDate);
                setTimeout(() => { autoScheduler(); }, 5000);
                return;
            }
            const hh = Math.floor(diff / 3600000);
            const mm = Math.floor((diff % 3600000) / 60000);
            const ss = Math.floor((diff % 60000) / 1000);
            display.innerText = `${hh<10?'0'+hh:hh}:${mm<10?'0'+mm:mm}:${ss<10?'0'+ss:ss}`;
            display.style.color = "#fff";
        }, 1000);
    }

    function startLiveUpdates(dateStr) {
        const body = document.getElementById('resultBody');
        database.ref('results/' + dateStr).on('value', (snap) => {
            const data = snap.val();
            if(!data) { body.innerHTML = "<tr><td colspan='5' style='padding:40px; color:#999; background:#fff;'>NO RESULTS</td></tr>"; return; }
            body.innerHTML = "";
            
            const times = Object.keys(data).sort((a, b) => {
                const parseTime = (t) => {
                    let [time, mod] = t.split(' ');
                    let [h, m] = time.split(':').map(Number);
                    if(h === 12) h = 0;
                    if(mod === 'PM') h += 12;
                    return h * 60 + m;
                };
                return parseTime(b) - parseTime(a);
            });

            const now = new Date();
            times.forEach(t => {
                let correctedTime = t.toUpperCase();
                if (correctedTime.startsWith("12:00 AM")) correctedTime = "12:00 PM";
                if (correctedTime.startsWith("12:30 AM")) correctedTime = "12:30 PM";

                let [timePart, ampm] = correctedTime.split(' ');
                let [hrs, mins] = timePart.split(':').map(Number);
                let checkH = (ampm === 'PM' && hrs < 12) ? hrs + 12 : (ampm === 'AM' && hrs === 12) ? 0 : hrs;
                
                // Hide results outside 9 AM - 9 PM
                if(checkH > 21 || (checkH === 21 && mins > 0) || checkH < 9) return;

                const resDateTime = new Date(`${dateStr} ${correctedTime}`);
                if (dateStr !== currentSystemDate || now >= resDateTime) {
                    let row = `<tr><td class="time-col">${correctedTime}</td>`;
                    const nums = data[t].numbers || [];
                    for(let i=0; i<4; i++) row += `<td>${nums[i] || '--'}</td>`;
                    body.innerHTML += row + "</tr>";
                }
            });
        });
    }

    function searchResult() {
        const d = document.getElementById('searchDate').value;
        if(!d) return alert("Select Date");
        database.ref('results/' + currentSystemDate).off();
        startLiveUpdates(d);
    }

    window.onload = () => {
        updateSystemDate();
        autoScheduler();
        setInterval(updateSystemDate, 30000);
    };
</script>
</body>
</html>
