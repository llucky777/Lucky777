<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>LUCKY 777 - LIVE RESULTS</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* CSS EKDOM SIMPLE AUR CLEAN */
        body { 
            background-color: #4a0000; /* Outer Background */
            margin: 0; 
            padding: 0; 
            font-family: Arial, Helvetica, sans-serif;
            display: flex;
            justify-content: center;
        }

        /* 🔥 Main Container - Jo Zoom aur Scroll hoga */
        .main-wrapper {
            width: 100%;
            max-width: 600px; /* Thoda wide rakha hai */
            background-color: #7a0000; /* Inner Background */
            min-height: 100vh;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            padding-bottom: 50px;
        }

        /* Header (Gold & Black) */
        .header {
            background: #000;
            padding: 20px 10px;
            text-align: center;
            border-bottom: 4px solid #ffd700;
        }
        .logo {
            font-size: 40px;
            color: #ffd700;
            font-weight: 900;
            margin: 0;
            text-shadow: 2px 2px #000;
            letter-spacing: 2px;
        }

        /* Timer Box */
        .timer-section {
            background: #111;
            margin: 15px;
            padding: 15px;
            border: 2px solid #ffd700;
            border-radius: 5px;
            text-align: center;
        }
        .next-label { color: #aaa; font-size: 12px; font-weight: bold; }
        #nextTimeDisplay { color: #fff; font-size: 28px; font-weight: 900; display: block; margin-top: 5px; }

        /* Search Section */
        .search-area {
            text-align: center;
            padding: 10px;
            background: rgba(0,0,0,0.2);
        }
        input[type="date"] {
            padding: 10px;
            font-size: 16px;
            border-radius: 4px;
            border: none;
            font-weight: bold;
        }
        .search-btn {
            background: #ffd700;
            color: #000;
            padding: 10px 20px;
            border: none;
            border-radius: 4px;
            font-weight: 900;
            cursor: pointer;
            margin-left: 5px;
        }

        /* 🔥 Result Table - Fixed Width taaki Zoom kaam kare */
        .table-container {
            padding: 10px;
            overflow-x: auto; /* Side scroll bhi chalega */
        }
        .result-table {
            width: 100%;
            min-width: 550px; /* Table ko failaya hai taaki slots saaf dikhein */
            border-collapse: collapse;
            background: #fff;
            color: #000;
            text-align: center;
        }
        .result-table th {
            background: #ffd700;
            color: #000;
            padding: 15px 5px;
            font-size: 14px;
            border: 1px solid #000;
        }
        .result-table td {
            border: 1px solid #ccc;
            padding: 15px 5px;
            font-size: 22px;
            font-weight: 900;
        }
        .time-col {
            background: #8b0000;
            color: #fff !important;
            width: 120px;
            font-size: 16px !important;
        }

        footer {
            text-align: center;
            color: #fff;
            padding: 40px 10px;
            font-size: 12px;
            opacity: 0.7;
        }
    </style>
</head>
<body>

<div class="main-wrapper">
    <div class="header">
        <h1 class="logo">LUCKY 777</h1>
        <div style="color: #fff; font-size: 12px; margin-top: 5px; font-weight: bold;">LIVE RESULTS PORTAL</div>
    </div>

    <div class="timer-section">
        <span class="next-label">NEXT RESULT TIME</span>
        <span id="nextTimeDisplay">LOADING...</span>
    </div>

    <div class="search-area">
        <input type="date" id="searchDate">
        <button class="search-btn" onclick="searchResult()">SEARCH</button>
    </div>

    <div class="table-container">
        <table class="result-table">
            <thead>
                <tr>
                    <th class="time-col">TIME</th>
                    <th>A</th>
                    <th>B</th>
                    <th>C</th>
                    <th>D</th>
                    <th>E</th>
                    <th>F</th>
                    <th>G</th>
                    <th>H</th>
                    <th>I</th>
                    <th>J</th>
                </tr>
            </thead>
            <tbody id="resultBody">
                </tbody>
        </table>
    </div>

    <footer>
        <p>&copy; 2026 LUCKY 777 OFFICIAL</p>
    </footer>
</div>

<script>
    // Config Linked to your Lucky-777-Official
    const firebaseConfig = {
        apiKey: "AIzaSyC7npaib3bcOy5rHCAduQnizEQ2BIe53no",
        authDomain: "lucky-777-official.firebaseapp.com",
        databaseURL: "https://lucky-777-official-default-rtdb.firebaseio.com",
        projectId: "lucky-777-official",
        appId: "1:882454930084:web:faa48f9c075def95d07c31"
    };
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    function startLiveUpdates(dateStr = null) {
        const resultBody = document.getElementById('resultBody');
        const targetDate = dateStr || new Date().toISOString().split('T')[0];

        database.ref('results/' + targetDate).on('value', (snapshot) => {
            const data = snapshot.val();
            if(!data) {
                resultBody.innerHTML = "<tr><td colspan='11' style='padding:50px; color:#999; background:#fff;'>NO RESULTS FOUND</td></tr>";
                return;
            }
            
            resultBody.innerHTML = "";
            const times = Object.keys(data).sort().reverse();
            const now = new Date();

            times.forEach(resTime => {
                const resDateTime = new Date(`${targetDate} ${resTime}`);

                if (now >= resDateTime) {
                    let row = `<tr><td class="time-col">${resTime}</td>`;
                    const timeNums = data[resTime].numbers || [];
                    for(let i=0; i<10; i++){
                        row += `<td>${timeNums[i] || '--'}</td>`;
                    }
                    row += `</tr>`;
                    resultBody.innerHTML += row;
                }
            });
        });
    }

    function syncAdminTime() {
        database.ref('app_settings/lucky777/nextResultTime').on('value', (snap) => {
            document.getElementById('nextTimeDisplay').innerText = snap.val() || "WAITING...";
        });
    }

    function searchResult() {
        const dateInput = document.getElementById('searchDate').value;
        if(!dateInput) return alert("Select Date!");
        startLiveUpdates(dateInput);
    }

    window.onload = () => {
        startLiveUpdates();
        syncAdminTime();
        setInterval(() => {
            if(!document.getElementById('searchDate').value) startLiveUpdates();
        }, 30000);
    };
</script>
</body>
</html>
